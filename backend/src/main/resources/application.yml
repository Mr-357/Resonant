quarkus:
  application:
    name: resonant-backend
    version: 1.0.0
    
  datasource:
    db-kind: postgresql
    username: resonant
    password: resonant
    jdbc:
      url: jdbc:postgresql://localhost:5432/resonant
    connection-maximization-size: 20
  hibernate-orm:
    database:
      generation: none
    dialect: org.hibernate.dialect.PostgreSQLDialect
  redis:
    hosts: redis://localhost:6379
  flyway:
    migrate-at-start: true
    locations: db/migration
# Enable CORS for all origins, methods, and headers. Adjust as needed for production.
  http:
    port: 8080
    cors:
      enabled: true
      origins: "/.*/"
      methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD"
      headers: "origin,content-type,accept,authorization,x-requested-with"
      access-control-allow-credentials: true
      access-control-max-age: 24H
mp:
  jwt:
    verify:
      # The server will reject any token where 'iss' claim != this value
      issuer: "resonant-app"
      publickey:
        location: "publicKey.pem"

smallrye:
  jwt:
    new-token:
      # This automatically adds "iss": "resonant-app" to every token you build
      issuer: "resonant-app"
    sign:
      key:
        location: "privateKey.pem"
  log:
    level: INFO
    category:
      "com.resonant": DEBUG
      "org.flywaydb": DEBUG

# Application-specific configuration
app:
  ratelimit:
# disabled temporarily to avoid issues during development. Enable and adjust limits as needed for production.
    enabled: false
    messages-per-minute: 10
    channels-per-minute: 50
    servers-per-minute: 100
    ttl-seconds: 60
  jwt:
    expiry-seconds: 3600
    issuer: resonant-app
    audience: resonant-users
  encryption:
    key: "your-256-bit-encryption-key-should-be-here" # Replace with your actual key
    blind-index-key: "your-256-bit-blind-index-key-should-be-here" # Replace with your actual key