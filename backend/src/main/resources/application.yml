# To enable the SQLite profile, run the application with -Dquarkus.profile=sqlite 
# or set the QUARKUS_PROFILE=sqlite environment variable.

"%sqlite":
  quarkus:
    datasource:
      devservices:
        enabled: false  # Stop Dev Services from recreating the DB
      db-kind: sqlite
      jdbc:
        url: jdbc:sqlite:resonant.sqlite
    hibernate-orm:
      schema-management:
        strategy: none
      mapping:
        uuid:
          preferred-jdbc-type: VARCHAR

"%postgresql":
  quarkus:
    datasource:
      db-kind: postgresql
      username: ${DB_USER:resonant}
      password: ${DB_PASSWORD:resonant}
      jdbc:
        url: ${DB_URL:jdbc:postgresql://localhost:5432/resonant}
    hibernate-orm:
      schema-management:
        strategy: none

"%dev":
  quarkus:
    datasource:
      db-kind: postgresql
      username: ${DB_USER:resonant}
      password: ${DB_PASSWORD:resonant}
      jdbc:
        url: ${DB_URL:jdbc:postgresql://localhost:5432/resonant}
    hibernate-orm:
      schema-management:
        strategy: none

"%prod":
  quarkus:
    datasource:
      db-kind: postgresql
      username: ${DB_USER:resonant}
      password: ${DB_PASSWORD:resonant}
      jdbc:
        url: ${DB_URL:jdbc:postgresql://localhost:5432/resonant}
    hibernate-orm:
      schema-management:
        strategy: none

quarkus:
  application:
    name: resonant-backend
    version: 1.0.0
  redis:
    hosts: ${REDIS_HOSTS:redis://localhost:6379}
  flyway:
    migrate-at-start: true
    locations: db/migration/${quarkus.datasource.db-kind}

  http:
    port: ${HTTP_PORT:8080}
    ssl-port: ${HTTPS_PORT:8443}
    insecure-requests: redirect
    ssl:
      certificate:
        # Relative to the working directory where the app is started
        files: ${SSL_CERT_PATH:certs/server.crt}
        key-files: ${SSL_KEY_PATH:certs/server.key}
    cors:
      enabled: true
      origins: "/.*/"
      methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD"
      access-control-allow-credentials: true
      access-control-max-age: 24H

mp:
  jwt:
    verify:
      # The server will reject any token where 'iss' claim != this value
      issuer: "resonant-app"
      publickey:
        location: ${JWT_PUBLIC_KEY:keys/publicKey.pem}

smallrye:
  jwt:
    new-token:
      # This automatically adds "iss": "resonant-app" to every token you build
      issuer: "resonant-app"
    sign:
      key:
        location: ${JWT_PRIVATE_KEY:keys/privateKey.pem}

  log:
    level: INFO
    category:
      "com.resonant": DEBUG
      "org.flywaydb": DEBUG

# Application-specific configuration
app:
  ratelimit:
# disabled temporarily to avoid issues during development. Enable and adjust limits as needed for production.
    enabled: false
    messages-per-minute: 10
    channels-per-minute: 50
    servers-per-minute: 100
    ttl-seconds: 60
  jwt:
    expiry-seconds: 3600
    issuer: resonant-app
    audience: resonant-users
  encryption:
    key: "your-256-bit-encryption-key-should-be-here" # Replace with your actual key
    blind-index-key: "your-256-bit-blind-index-key-should-be-here" # Replace with your actual key
