services:
  postgres:
    image: postgres:16-alpine
    container_name: resonant-postgres
    environment:
      POSTGRES_DB: resonant
      POSTGRES_USER: resonant
      POSTGRES_PASSWORD: resonant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resonant -d resonant"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: resonant-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resonant-backend
    ports:
      - "8443:8443"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/resonant
      QUARKUS_DATASOURCE_USERNAME: resonant
      QUARKUS_DATASOURCE_PASSWORD: resonant
      QUARKUS_REDIS_HOSTS: redis://redis:6379
      QUARKUS_HTTP_CORS_ORIGINS: "*"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/certs:/app/certs:ro
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "--quiet", "--tries=1", "--spider", "https://localhost:8443/q/health/live"] 
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://localhost:8443
    container_name: resonant-frontend
    ports:
      - "3443:443"
    depends_on:
      - backend
    volumes:
      - ./backend/certs:/etc/nginx/certs:ro

volumes:
  postgres_data:
