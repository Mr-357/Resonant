services:
  postgres:
    image: postgres:16-alpine
    container_name: resonant-postgres
    environment:
      POSTGRES_DB: resonant
      POSTGRES_USER: resonant
      POSTGRES_PASSWORD: resonant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resonant -d resonant"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: resonant-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resonant-backend
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/resonant
      QUARKUS_DATASOURCE_USERNAME: resonant
      QUARKUS_DATASOURCE_PASSWORD: resonant
      QUARKUS_REDIS_HOSTS: redis://redis:6379
      QUARKUS_HTTP_CORS_ORIGINS: "*"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/q/openapi.json"] 
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resonant-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8080

  e2e-tests:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    container_name: resonant-e2e
    working_dir: /work
    environment:
      - API_URL=http://backend:8080
      - APP_URL=http://frontend:80
      - CI=true
    volumes:
      - ./frontend:/work
      - /work/node_modules
    command: /bin/bash -c "npm install && npx playwright test"
    depends_on:
      - frontend
      - backend
    ipc: host

volumes:
  postgres_data:
