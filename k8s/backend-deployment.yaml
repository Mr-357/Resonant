apiVersion: apps/v1
kind: Deployment
metadata:
  name: resonant-backend
  labels:
    app: resonant-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: resonant-backend
  template:
    metadata:
      labels:
        app: resonant-backend
    spec:
      containers:
      - name: backend
        image: resonant-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: resonant-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            scheme: HTTPS
            path: /q/health/live
            port: 8443
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            scheme: HTTPS 
            path: /q/health/ready
            port: 8443
          initialDelaySeconds: 10
          periodSeconds: 5
