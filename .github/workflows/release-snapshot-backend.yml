name: Snapshot Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  release:
    name: Build and Release Latest
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Remove application configuration from build
        run: rm -f backend/src/main/resources/application.yml backend/src/main/resources/application.yaml

      - name: Build Uber-JAR
      # We override the datasource configuration to avoid build failures due to missing DB during the build process. The actual configuration will be provided at runtime via environment variables or a mounted config file in production.
        run: mvn -B package -DskipTests -Dquarkus.package.jar.type=uber-jar -Dquarkus.datasource.db-kind=postgresql -Dquarkus.datasource.username=dummy -Dquarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/dummy --file backend/pom.xml

      - name: Create Latest Snapshot Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest"
          prerelease: false
          title: "Latest Snapshot Build"
          files: backend/target/*-runner.jar
