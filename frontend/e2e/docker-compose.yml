services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: resonant
      POSTGRES_USER: resonant
      POSTGRES_PASSWORD: resonant
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resonant -d resonant"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/resonant
      QUARKUS_DATASOURCE_USERNAME: resonant
      QUARKUS_DATASOURCE_PASSWORD: resonant
      QUARKUS_REDIS_HOSTS: redis://redis:6379
      QUARKUS_HTTP_CORS_ORIGINS: "*"
      SSL_CERT_PATH: /work/certs/server.crt
      SSL_KEY_PATH: /work/certs/server.key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../backend/certs:/work/certs:ro
      - ../../backend/keys:/work/keys:ro
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "--quiet", "--tries=1", "--spider", "https://localhost:8443/q/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
       VITE_API_URL: https://backend:8443 # Frontend connects to backend via service name
    depends_on:
      - backend
    volumes:
      - ../../backend/certs:/etc/nginx/certs:ro

      

  e2e-tests:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    working_dir: /work
    environment:
      - API_URL=https://backend:8443
      - APP_URL=https://frontend:443  # E2E tests connect to frontend via HTTPS
      - CI=true
    volumes:
      - ../:/work
      - /work/node_modules
    command: /bin/bash -c "npm install && npx playwright test"
    depends_on:
      - frontend
      - backend
    ipc: host
