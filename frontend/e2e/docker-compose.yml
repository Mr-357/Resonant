services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: resonant
      POSTGRES_USER: resonant
      POSTGRES_PASSWORD: resonant
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resonant -d resonant"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/resonant
      QUARKUS_DATASOURCE_USERNAME: resonant
      QUARKUS_DATASOURCE_PASSWORD: resonant
      QUARKUS_REDIS_HOSTS: redis://redis:6379
      QUARKUS_HTTP_CORS_ORIGINS: "*"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/q/openapi.json"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8080      

  e2e-tests:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    working_dir: /work
    environment:
      - API_URL=http://backend:8080
      - APP_URL=http://frontend:80
      - CI=true
    volumes:
      - ../:/work
      - /work/node_modules
    command: /bin/bash -c "npm install && npx playwright test"
    depends_on:
      - frontend
      - backend
    ipc: host