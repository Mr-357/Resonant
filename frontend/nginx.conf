server {
    listen 80;
    listen [::]:80;
    server_name localhost; # Or your domain name

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 3443 ssl;
    listen [::]:3443 ssl;
    server_name localhost; # Or your domain name

    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # Recommended SSL settings for security and performance
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;

    client_max_body_size 10M;
    access_log /dev/fd/1;
    
    # Don't cache index.html - always fetch fresh
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate"; # Ensure fresh index.html
        add_header Pragma "no-cache"; # For older HTTP/1.0 clients
        add_header Expires "0"; # For older HTTP/1.0 clients
    }
    
    # Cache all assets with hashes for 1 year
    location ~* "\-[0-9a-f]{8}\.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$" {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable"; # Cache hashed assets aggressively
    }
    
    # Default location
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        # For SPAs, ensure the main index.html is always fresh
        add_header Cache-Control "no-cache, no-store, must-revalidate"; 
        add_header Pragma "no-cache"; 
        add_header Expires "0"; 
    }
    
    location /api/ {
        proxy_pass https://backend:8443;

        # Enable verification and trust the mounted self-signed certificate
        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /etc/nginx/certs/server.crt;
        proxy_ssl_server_name on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_no_cache 1;
    }
}
